services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: equiminds-frontend
    ports:
      - "80:80"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: equiminds-backend
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    restart: unless-stopped
